<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="library.css">
    <title>자료실 — 스킬스북도서관</title>
</head>
<body>

    <!-- ===== 로그인 팝업 ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-window">
            <div class="login-header">
                <h3>로그인</h3>
                <button class="login-x" id="loginClose">&#10005;</button>
            </div>
            <div class="login-body">
                <div class="login-msg" id="loginMsg"></div>
                <div class="login-field">
                    <label class="login-label">아이디</label>
                    <input type="text" class="login-input" id="loginId" placeholder="아이디를 입력하세요">
                </div>
                <div class="login-field">
                    <label class="login-label">비밀번호</label>
                    <input type="password" class="login-input" id="loginPw" placeholder="비밀번호를 입력하세요">
                </div>
                <button class="login-btn" id="loginSubmit">로그인</button>
            </div>
        </div>
        <div class="login-bg" id="loginBg"></div>
    </div>

    <!-- ===== 회원가입 팝업 ===== -->
    <div class="login-overlay" id="signupOverlay">
        <div class="login-window">
            <div class="login-header">
                <h3>회원가입</h3>
                <button class="login-x" id="signupClose">&#10005;</button>
            </div>
            <div class="login-body">
                <div class="login-msg" id="signupMsg"></div>
                <div class="login-field">
                    <label class="login-label">아이디</label>
                    <input type="text" class="login-input" id="signupId" placeholder="아이디를 입력하세요">
                </div>
                <div class="login-field">
                    <label class="login-label">비밀번호</label>
                    <input type="password" class="login-input" id="signupPw" placeholder="비밀번호를 입력하세요">
                </div>
                <div class="login-field">
                    <label class="login-label">이름</label>
                    <input type="text" class="login-input" id="signupName" placeholder="이름을 입력하세요">
                </div>
                <button class="login-btn" id="signupSubmit">회원가입</button>
            </div>
        </div>
        <div class="login-bg" id="signupBg"></div>
    </div>

    <div class="wrapper">
        <header class="header">
            <div class="container">
                <h1 class="logo">
                    <a href="index.html">
                        <div class="logo-symbol">
                            <span class="book-page left"></span>
                            <span class="book-page right"></span>
                            <span class="gear"></span>
                        </div>
                        <span class="logo-text">스킬스북도서관</span>
                    </a>
                </h1>
                <nav class="nav">
                    <ul class="main-menu">
                        <li class="menu-list">
                            <input type="checkbox" id="menu1" class="menu-trigger">
                            <label for="menu1" class="menu-item">도서관소개 <span class="icon"></span></label>
                            <ul class="sub-menu">
                                <li><a href="sub-menu.html">도서관소개</a></li>
                                <li><a href="#">도서관현황</a></li>
                            </ul>
                        </li>
                        <li class="menu-list">
                            <input type="checkbox" id="menu2" class="menu-trigger">
                            <label for="menu2" class="menu-item">도서자료실 <span class="icon"></span></label>
                            <ul class="sub-menu">
                                <li><a href="library.html">자료실</a></li>
                                <li><a href="#">열람실예약</a></li>
                            </ul>
                        </li>
                        <li class="menu-list">
                            <input type="checkbox" id="menu3" class="menu-trigger">
                            <label for="menu3" class="menu-item">회원서비스 <span class="icon"></span></label>
                            <ul class="sub-menu">
                                <li><a href="#">회원가입</a></li>
                                <li><a href="mypage.html">마이페이지</a></li>
                            </ul>
                        </li>
                        <li><a href="#" class="menu-item">신규도서등록</a></li>
                        <li><a href="#" class="menu-item">대출/열람실</a></li>
                    </ul>
                </nav>
                <div class="user-menu" id="userMenu">
                    <div id="guestArea">
                        <button class="login-toggle" id="openLogin">로그인</button>
                        <span class="bar"></span>
                        <button class="login-toggle" id="openSignup">회원가입</button>
                    </div>
                    <div id="memberArea" style="display:none; align-items:center; gap:10px;">
                        <span class="member-info" id="memberInfo"></span>
                        <span class="bar"></span>
                        <button class="login-toggle" id="logoutBtn">로그아웃</button>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- 페이지 타이틀 -->
            <div class="page-title-bar">
                <div class="page-title-inner">
                    <span class="page-sub">BOOK COLLECTION</span>
                    <h2>자료실</h2>
                    <p>원하시는 도서를 검색하고 대출하세요.</p>
                </div>
            </div>

            <!-- 도서 목록 -->
            <section class="lib-section">
                <div class="lib-container">
                    <div class="lib-toolbar">
                        <span class="lib-count">전체 <strong id="totalCount">0</strong>권</span>
                    </div>
                    <div class="book-table-wrap">
                        <table class="book-table">
                            <colgroup>
                                <col class="col-img">
                                <col class="col-title">
                                <col class="col-author">
                                <col class="col-year">
                                <col class="col-price">
                                <col class="col-status">
                                <col class="col-period">
                                <col class="col-btn">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>도서사진</th>
                                    <th>도서명</th>
                                    <th>저자명</th>
                                    <th>발행년</th>
                                    <th>가격</th>
                                    <th>대출상태</th>
                                    <th>대출기간</th>
                                    <th>대출</th>
                                </tr>
                            </thead>
                            <tbody id="bookTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container footer-container">
                <div class="footer-info">
                    <div class="footer-contact">
                        <span class="contact-label">문의전화안내</span>
                        <span class="contact-number">1644-8000</span>
                        <span class="contact-time">운영시간(평일) 09:00~18:00</span>
                    </div>
                    <address class="footer-address">
                        인천시 부평구 무네미로 448번길 77<br>
                        한국산업인력공단 글로벌숙련기술진흥원
                    </address>
                    <p class="copyright">COPYRIGHTⓒ 2016 HRDKOREA</p>
                </div>
                <div class="footer-sns">
                    <a href="#" class="sns-link"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="sns-link"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="sns-link"><i class="fab fa-youtube"></i></a>
                    <a href="#" class="sns-link"><i class="fas fa-bold"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script src="index.js"></script>
    <script src="library.js"></script>
</body>
</html>
