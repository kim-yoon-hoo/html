<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
/* ===================================== */
/*                 행사달력               */
/* ===================================== */

#calendar{
    background-color: var(--bg-section);
    .cal-header{
        margin-bottom: 1em;
        h3{
            font-size: 1.4em;
            color: var(--dark);
        }
        .cal-controls select{
            padding: 0.5em 0.5em;
            border-radius: 8px;
            background-color: var(--bg);
            border: 2px solid var(--cream);
            color: var(--dark);
            outline: auto var(--cream);
        }
    }
    .cal-body{border: 1px solid var(--cream);}

    .cal-row{
        display: grid;
        grid-template-columns: repeat(7,1fr);
        background-color: #fff;
        &:nth-child(1){
            div{
                min-height: 3em;
                text-align: center;
                align-content: center;
            }
        }
        div{
            padding: 0.3em;
            min-height: 8em;
            border: 1px solid var(--cream);
            span{
                width: 100%;
                display: inline-block;
                margin-bottom: 0.3em;
            }

            &:nth-child(1){color: rgb(238, 112, 112);}
            &:nth-child(7){color: rgb(108, 147, 231);}
        }
    }
}
.cal-non{color: #ccc;} /* 없는 날 */
.event{font-size: 0.7em; padding: 0.2em 0.5em; background-color: var(--cream); color: var(--accent);}  /* 일정 기본 */
.blue{background-color: rgba(108, 147, 231, 0.2); color: rgb(78, 124, 224);} /* 전시 */
.red{background-color: rgba(238, 112, 112, 0.2); color: rgb(235, 93, 93);} /* 휴관 */
.green{background-color: rgba(115, 185, 115, 0.2); color: rgb(115, 185, 115);} /* 행사 */
    </style>
</head>
<body>
    <!-- 행사달력 -->
    <section id="calendar">
        <h2 class="section-title">행사달력</h2>
		<div class="section-inner">
			<!-- 달력 헤더 -->
			<div class="cal-header f jsb aic">
				<h3>2026년 4월</h3>
				<div class="cal-controls">
					<select>
						<option>2025년</option>
						<option selected>2026년</option>
						<option>2027년</option>
					</select>
					<select>
						<option>1월</option>
						<option>2월</option>
						<option>3월</option>
						<option selected>4월</option>
						<option>5월</option>
						<option>6월</option>
						<option>7월</option>
						<option>8월</option>
						<option>9월</option>
						<option>10월</option>
						<option>11월</option>
						<option>12월</option>
					</select>
				</div>
			</div>

			<!-- 달력 내용 -->
			<div class="cal-body f-c">
				<div class="cal-row">
					<div><span>일</span></div>
					<div><span>월</span></div>
					<div><span>화</span></div>
					<div><span>수</span></div>
					<div><span>목</span></div>
					<div><span>금</span></div>
					<div><span>토</span></div>
				</div>
				<div class="cal-row">
					<div><span class="cal-non">29</span></div>
					<div><span class="cal-non">30</span></div>
					<div><span class="cal-non">31</span></div>
					<div><span>1</span><span class="event blue">전시 4월 북큐레이션</span></div>
					<div><span>2</span></div>
					<div><span>3</span><span class="event blue">전시 4월 북큐레이션</span></div>
					<div><span>4</span></div>
				</div>
				<div class="cal-row">
					<div><span>5</span></div>
					<div><span>6</span><span class="event red">휴관 정기휴관일</span></div>
					<div><span>7</span></div>
					<div><span>8</span></div>
					<div><span>9</span></div>
					<div><span>10</span><span class="event">숙련기술인과의 만남</span></div>
					<div><span>11</span></div>
				</div>
				<div class="cal-row">
					<div><span>12</span></div>
					<div><span>13</span><span class="event red">휴관정기휴관일</span></div>
					<div><span>14</span></div>
					<div><span>15</span></div>
					<div><span>16</span></div>
					<div>
						<span>17</span>
						<span class="event green">행사 책읽는 숙련광장</span>
						<span class="event green">행사 기능 책마당</span>
						<span class="event green">행사 책읽는 숙련기술</span>
						<span class="event blue">전시 4월 북큐레이션</span>
					</div>
					<div><span>18</span></div>
				</div>
				<div class="cal-row">
					<div><span>19</span></div>
					<div><span>20</span><span class="event red">휴관 정기휴관일</span></div>
					<div>
						<span>21</span>
						<span class="event green">행사 숙련기술 책마당</span>
						<span class="event green">행사 책읽는 맑은냇가</span>
						<span class="event green">행사 책읽는 숙련광장</span>
						<span class="event blue">전시 4월 북큐레이션</span>
					</div>
					<div><span>22</span></div>
					<div><span>23</span></div>
					<div><span>24</span></div>
					<div><span>25</span></div>
				</div>
				<div class="cal-row">
					<div><span>26</span></div>
					<div><span>27</span></div>
					<div><span>28</span></div>
					<div><span>29</span></div>
					<div><span>30</span></div>
					<div><span class="cal-non">1</span></div>
					<div><span class="cal-non">2</span></div>
				</div>
			</div>
		</div>
    </section>
</body>
</html>
